name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

jobs:
  quality-gates:
    name: Backend, frontend and quality gates
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: andje
          POSTGRES_PASSWORD: andje_dev_local
          POSTGRES_DB: andje_chat_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U andje -d andje_chat_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ASPNETCORE_ENVIRONMENT: Test
      ANDJE_DB_PASSWORD: andje_dev_local
      ANDJE_DB_PORT: "5432"
      ANDJE_REQUIRE_POSTGRES_TESTS: "true"
      AgentAccess__Enabled: "true"
      AgentAccess__DevelopmentAccessCode: andje-agent-local
      AgentAccess__SessionMinutes: "120"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: |
            apps/console/package-lock.json
            apps/widget/package-lock.json

      - name: Restore backend
        run: dotnet restore backend/Andje.Chat.sln

      - name: Test backend with PostgreSQL
        run: dotnet test backend/Andje.Chat.sln --no-restore --configuration Release

      - name: Build console
        working-directory: apps/console
        run: |
          npm ci
          npm run build

      - name: Build widget
        working-directory: apps/widget
        run: |
          npm ci
          npm run build

      - name: Validate Docker Compose config
        run: docker compose config -q

      - name: Secret scan with Gitleaks
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.30.1 detect \
            --source=/repo \
            --no-git \
            --redact \
            --config=/repo/.gitleaks.toml

      - name: Check .NET vulnerable packages
        run: |
          dotnet list backend/Andje.Chat.sln package --vulnerable --include-transitive --format json > dotnet-vulnerable.json
          cat dotnet-vulnerable.json
          python - <<'PY'
          import json
          import sys

          with open("dotnet-vulnerable.json", encoding="utf-8") as handle:
              report = json.load(handle)

          findings = []

          def walk(node, path="root"):
              if isinstance(node, dict):
                  vulnerabilities = node.get("vulnerabilities")
                  if vulnerabilities:
                      findings.append((path, vulnerabilities))
                  for key, value in node.items():
                      walk(value, f"{path}.{key}")
              elif isinstance(node, list):
                  for index, value in enumerate(node):
                      walk(value, f"{path}[{index}]")

          walk(report)

          if findings:
              print("Vulnerable .NET packages found:")
              for path, vulnerabilities in findings:
                  print(f"- {path}: {vulnerabilities}")
              sys.exit(1)

          print("No vulnerable .NET packages found.")
          PY

      - name: Audit console npm dependencies
        working-directory: apps/console
        run: npm audit --audit-level=high

      - name: Audit widget npm dependencies
        working-directory: apps/widget
        run: npm audit --audit-level=high

      - name: Check local env file is not versioned
        run: |
          if git ls-files --error-unmatch .env >/dev/null 2>&1; then
            echo ".env must not be versioned"
            exit 1
          fi
