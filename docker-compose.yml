name: andje-chat

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: andje_chat
      POSTGRES_USER: andje
      # Valor por defecto SOLO para desarrollo local. En cualquier entorno
      # compartido debe definirse ANDJE_DB_PASSWORD (ver .env.example) y
      # provenir de un gestor de secretos.
      POSTGRES_PASSWORD: ${ANDJE_DB_PASSWORD:-andje_dev_local}
    ports:
      # 5433 en el host para no chocar con instalaciones locales de PostgreSQL.
      - "${ANDJE_DB_PORT:-5433}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U andje -d andje_chat"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: backend
      dockerfile: src/Andje.Chat.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__ChatDb: Host=db;Port=5432;Database=andje_chat;Username=andje;Password=${ANDJE_DB_PASSWORD:-andje_dev_local}
      # Acceso local de desarrollo para la consola; no usar como secreto real.
      ANDJE_AGENT_ACCESS_ENABLED: "true"
      ANDJE_AGENT_DEV_CODE: ${ANDJE_AGENT_DEV_CODE:-andje-agent-local}
      ANDJE_AGENT_SESSION_MINUTES: ${ANDJE_AGENT_SESSION_MINUTES:-120}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  console:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./apps/console:/app
      - console-node-modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - api

  widget:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./apps/widget:/app
      - widget-node-modules:/app/node_modules
    ports:
      - "5174:5174"
    depends_on:
      - api

volumes:
  db-data:
  console-node-modules:
  widget-node-modules:
